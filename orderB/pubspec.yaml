name: bakery
description: Customer ordering app for Breaking Bread bakery.
publish_to: 'none'

# version: <semver>+<build number>
# Bump the build number on EVERY upload to Play Store — duplicates
# are rejected. The semver is what shows in the store listing; the
# build number is what the Play Console keys releases off.
version: 1.0.0+2

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  go_router: ^13.2.0
  provider: ^6.1.2
  lottie: ^3.1.0
  intl: ^0.19.0
  google_fonts: ^6.2.0
  shared_preferences: ^2.5.5
  dio: ^5.4.3
  flutter_secure_storage: ^9.2.2
  geolocator: ^11.0.0
  cached_network_image: ^3.4.1
  package_info_plus: ^9.0.1
  path_provider: ^2.1.5
  firebase_core: ^4.10.0
  firebase_crashlytics: ^5.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    # Logo lives next to the rest of the brand system (colors,
    # typography, theme) in lib/core/brandkit/ rather than under
    # assets/, so all brand-related stuff is in one folder. Declared
    # as a single file because declaring the directory would also
    # bundle the .dart files in there as assets.
    - lib/core/brandkit/bakery_logo.jpg

# Generates Android launcher icons from the Breaking Bread logo. Run
# `dart run flutter_launcher_icons` after touching this block. The
# adaptive icon (Android 8+) layers the logo onto the same off-white
# the logo itself sits on, so the icon looks consistent in launchers
# that draw the foreground without the background (e.g. Pixel Launcher).
flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "lib/core/brandkit/bakery_logo.jpg"
  min_sdk_android: 21
  adaptive_icon_background: "#F5F0E8"
  adaptive_icon_foreground: "lib/core/brandkit/bakery_logo.jpg"

# Android pre-Flutter splash. Background-only — no logo here. The raw
# JPG asset has a white square baked in, which reads as an "incomplete
# logo sticker" against the warm-white scaffold. Skipping it means the
# native splash is just the matching background color, then the Flutter
# SplashScreen mounts with the proper rounded-container logo as the
# first thing the user actually sees. Run `dart run
# flutter_native_splash:create` after touching this block.
flutter_native_splash:
  color: "#F5F0E8"
  android: true
  ios: false
  web: false
  android_12:
    color: "#F5F0E8"
